# Chapter 4 · Lesson 3 — the multi-service test stack.
#
# Distinct from the Chapter 3 dev compose: there is no source bind-mount and
# no `sleep infinity`. Each container runs its real CMD against a built image
# artifact — the topology the app will have in production.
#
#   ingestion  :8081   parses + embeds + stores      (heavy image)
#   query      :8080   retrieves + calls the LLM      (lean image)
#   chromadb   :8000   vector store                   (off-the-shelf image)
#
# Bring it up:  docker compose -f docker-compose.test.yaml up -d --build
# Check it:     docker compose -f docker-compose.test.yaml ps
# Tear it down: docker compose -f docker-compose.test.yaml down -v

networks:
  rag-net:
    driver: bridge

services:
  ingestion:
    build:
      context: .
      dockerfile: chapter_4/l2/Dockerfile_Ingestion
    image: rag-ingestion:0.1.0
    ports:
      - "8081:8081"
    environment:
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - RAG_API_KEYS=${RAG_API_KEYS:-dev-key}
    depends_on:
      chromadb:
        condition: service_healthy
    networks:
      - rag-net

  query:
    build:
      context: .
      dockerfile: chapter_4/l2/Dockerfile_Query
    image: rag-query:0.1.0
    ports:
      - "8080:8080"
    environment:
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - RAG_API_KEYS=${RAG_API_KEYS:-dev-key}
    depends_on:
      chromadb:
        condition: service_healthy
    networks:
      - rag-net

  chromadb:
    image: chromadb/chroma:1.3.5
    volumes:
      - ./chroma_data:/chroma/chroma
    environment:
      - ANONYMIZED_TELEMETRY=false
    healthcheck:
      # The off-the-shelf chroma 1.x image is a compiled server on a minimal
      # Debian base — no curl, wget, or python inside, only bash. So we probe
      # with bash's built-in /dev/tcp: open a socket to the heartbeat endpoint
      # and confirm an HTTP 200 (the command exits non-zero on any failure).
      test:
        - "CMD"
        - "bash"
        - "-c"
        - "exec 3<>/dev/tcp/localhost/8000 && printf 'GET /api/v2/heartbeat HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n' >&3 && grep -q '200 OK' <&3"
      interval: 10s
      timeout: 5s
      retries: 5
      # Give chroma time to boot before the first probe counts against retries.
      start_period: 20s
    networks:
      - rag-net
