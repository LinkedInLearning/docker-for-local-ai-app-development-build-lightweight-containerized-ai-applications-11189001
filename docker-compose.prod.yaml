networks:
  rag-docker:
    driver: bridge

services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile_API
    ports:
      - 8080:8080
    depends_on:
      chromadb:
        condition: service_healthy
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - RAG_CONFIG_PATH=/app/config/settings.yaml
    networks:
      - rag-docker

  chromadb:
    image: chromadb/chroma:1.3.5
    ports:
      - 8000:8000
    volumes:
      - ${CHROMA_DATA_PATH:-./chroma_data}:/chroma/chroma
    environment:
      - ANONYMIZED_TELEMETRY=false
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/v2/heartbeat || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - rag-docker

  phoenix:
    image: arizephoenix/phoenix:4.6.0
    profiles:
      - observability
    ports:
      - 6006:6006
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:6006 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - rag-docker
