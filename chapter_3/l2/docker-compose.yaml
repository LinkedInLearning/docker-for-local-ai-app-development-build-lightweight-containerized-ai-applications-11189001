# Chapter 3 · Lesson 2 — a minimal Docker Compose example for the RAG dev
# environment. Two services on one user-defined network:
#
#   python    the development container (where we write and run code)
#   chromadb  the vector database, pulled as a dedicated, prebuilt image
#
# Bring it up:    docker compose up -d
# Check it:       docker compose ps
# Tear it down:   docker compose down
#
# This is a teaching-sized version of the project's top-level
# docker-compose.yaml. The real file adds API keys, a HuggingFace cache
# mount, and a few more environment variables.

networks:
  rag-docker:
    driver: bridge

services:
  # The development container. We don't give it a job to run — `sleep
  # infinity` keeps it alive so we can attach to it (VS Code, docker exec)
  # and develop inside it. It can reach the database at the hostname
  # `chromadb` thanks to the shared network.
  python:
    image: docker.io/rkrispin/python-dev-rag-docker:0.0.3
    volumes:
      - .:/workspace:cached          # mount the project into the container
    command: sleep infinity
    depends_on:
      - chromadb
    environment:
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
    networks:
      - rag-docker

  # The vector database. A dedicated, prebuilt image — we don't build or
  # maintain it ourselves, we just pin a version and run it.
  chromadb:
    image: chromadb/chroma:1.3.5
    ports:
      - 8000:8000                    # expose the DB to the host for inspection
    volumes:
      - ./chroma_data:/chroma/chroma # persist the data across restarts
    environment:
      - ANONYMIZED_TELEMETRY=false
    networks:
      - rag-docker
