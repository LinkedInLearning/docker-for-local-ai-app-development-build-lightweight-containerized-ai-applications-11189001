networks:
  rag-docker:
    driver: bridge
services:
  python:
    image: docker.io/rkrispin/python-dev-rag-docker:0.0.3
    volumes:
      - .:/workspace:cached
      # - hf-cache:/opt/hf-cache                  # (b) named volume
      - ${HF_HOME:-~/.cache/huggingface}:/opt/hf-cache   # (c) bind mount
    command: sleep infinity
    depends_on:
      - chromadb
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - LANGSMITH_API_KEY=${LANGSMITH_API_KEY}
      - CHROMA_DATA_PATH=${CHROMA_DATA_PATH:-./chroma_data}
      # HuggingFace / Docling cache location inside the container.
      # Must match the mount target above. Setting it here makes the
      # named-volume layout work even if the image wasn't built with
      # ENV HF_HOME=/opt/hf-cache (e.g. you're running a pre-Dockerfile
      # change image like 0.0.3 pulled from Docker Hub).
      - HF_HOME=/opt/hf-cache
    networks:
      - rag-docker

  chromadb:
    image: chromadb/chroma:1.3.5
    ports:
      - 8000:8000
    volumes:
      - ${CHROMA_DATA_PATH:-./chroma_data}:/chroma/chroma
    environment:
      - ANONYMIZED_TELEMETRY=false
    networks:
      - rag-docker
