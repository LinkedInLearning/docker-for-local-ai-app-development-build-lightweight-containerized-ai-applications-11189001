networks:
  rag-docker:
    driver: bridge

services:
  python:
    image: docker.io/rkrispin/python-dev-rag-docker:0.0.2
    volumes:
      - .:/workspace:cached
      - ${HF_HOME:-~/.cache/huggingface}:/root/.cache/huggingface
    command: sleep infinity
    depends_on:
      - chromadb
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - LANGSMITH_API_KEY=${LANGSMITH_API_KEY}
      - CHROMA_DATA_PATH=${CHROMA_DATA_PATH:-./chroma_data}
    networks:
      - rag-docker

  chromadb:
    image: chromadb/chroma:1.3.5
    ports:
      - 8000:8000
    volumes:
      - ${CHROMA_DATA_PATH:-./chroma_data}:/chroma/chroma
    environment:
      - ANONYMIZED_TELEMETRY=false
    networks:
      - rag-docker

  phoenix:
    image: arizephoenix/phoenix:4.6.0
    profiles:
      - observability
    ports:
      - 6006:6006
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:6006 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - rag-docker
